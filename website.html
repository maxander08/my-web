:root{
  --black:#000000;
  --void:#05050a;
  --text:#c9cdd3;
  --text-dim:#5f6670;
  --text-bright:#f3f5f7;
  --cyan:#23c9d6;
  --cyan-dim:#0f5a60;
  --amber:#ffb000;
  --amber-dim:#5e4100;
  --red:#ff5f5f;
  --taskbar-bg:#0b0c12;
  --taskbar-border:#1c2230;
  --win-w: min(900px, 92vw);
  --win-h: min(640px, 72vh);
}

*{ box-sizing:border-box; }

html,body{
  height:100%;
  height:100dvh; /* on phones, dvh tracks the real visible area instead of the address-bar-inflated 100vh */
  margin:0;
  background:var(--black);
  overflow:hidden;
  -webkit-text-size-adjust:100%;
  text-size-adjust:100%;
}

body{
  font-family:"ProFont","Consolas","Lucida Console",monospace;
  -webkit-font-smoothing:none;
  font-smooth:never;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  min-height:100vh;
  min-height:100dvh;
}

/* faint vignette behind everything, gives the screen some depth without
   reaching for the obvious neon-green-hacker cliche */
.desktop{
  flex:1 1 auto;
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px 12px;
  background:
    radial-gradient(ellipse at 50% 35%, #0c0e16 0%, #000000 70%);
  position:relative;
  min-height:0;
}

/* ---------- terminal window ---------- */

.terminal{
  width:var(--win-w);
  height:var(--win-h);
  max-height:calc(100vh - 110px);

  border-bottom:1px solid var(--cyan-dim);
  color:var(--cyan);
  font-size:13px;
  letter-spacing:.5px;
  user-select:none;
  cursor:default;

.title-bar-path{
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;

.title-bar-controls{
  display:flex;
  gap:5px;
  flex:0 0 auto;
}

.ctrl-btn{
  width:20px;
  height:18px;
  background:#0d1620;
  border:1px solid var(--cyan-dim);
  color:var(--cyan);
  font-family:inherit;
  font-size:11px;
  line-height:1;
  cursor:pointer;
  padding:0;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

.ctrl-btn:hover{
  background:var(--cyan-dim);
  color:var(--text-bright);
}

.ctrl-btn.ctrl-close:hover{
  background:var(--red);
  border-color:var(--red);
  color:#1a0000;
}

  flex-direction:column;
  min-height:0;
  background:var(--black);
  overflow:hidden;
}

.crt-screen::before{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  background:repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.035) 0px,
    rgba(255,255,255,0.035) 1px,
    transparent 1px,
    transparent 3px
  );
  z-index:3;
}

.crt-screen::after{
  content:"";
  position:absolute;
  inset:0;
  pointer-events:none;
  box-shadow:inset 0 0 90px 18px rgba(0,0,0,0.75);
  z-index:3;
  animation:flicker 5.5s infinite;
}

@keyframes flicker{
  0%,97%,100%{ opacity:1; }

  99%{ opacity:.98; }

@media (prefers-reduced-motion: reduce){

.banner{ color:var(--cyan); margin-bottom:4px; }

.prompt{

.input-wrap{

  cursor:text;
}

.typed{

  word-break:break-all;
}

.cursor{

#hiddenInput{

  inset:0;
  width:100%;
  height:100%;

  color:transparent;
  caret-color:transparent;

  padding:0;
  margin:0;

  font-size:13px;
  color:var(--text);
  user-select:none;
  overflow-x:auto;

  scrollbar-width:none;

.taskbar::-webkit-scrollbar{ display:none; }

.start-btn{

  align-items:center;
  gap:6px;
  height:24px;
  padding:0 10px;
  background:#11151f;
  border:1px solid var(--taskbar-border);
  color:var(--amber);
  font-family:inherit;
  font-size:13px;
  cursor:pointer;
  flex:0 0 auto;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

.taskbar-button{
  appearance:none;
  -webkit-appearance:none;
  border-radius:0;
  position:relative;
  padding:0 10px;
  font:inherit;
  line-height:1;

}

.start-btn:hover{ background:#181d2c; }
.start-btn:active{ background:var(--amber-dim); color:var(--text-bright); }

.taskbar-button:hover{ background:#181d2c; }
.taskbar-button:active{ background:var(--amber-dim); color:var(--text-bright); }

.taskbar-sep{
  width:1px;
  height:18px;
  background:var(--taskbar-border);
  flex:0 0 auto;
}

.task-item{
  display:flex;
  align-items:center;
  gap:6px;
  color:var(--text-dim);
  flex:0 0 auto;
}

.task-item.clickable{
  cursor:pointer;
}

.task-item.testing .wifi-bars rect{ fill:var(--amber); }
.task-item.testing #wifiLabel{ color:var(--amber); }

  color:var(--text-dim);

.taskbar-button.task-item.online #wifiLabel{ color:var(--cyan); }

.taskbar-button.task-item.testing .wifi-bars rect{ fill:var(--amber); }
.taskbar-button.task-item.testing #wifiLabel{ color:var(--amber); }

.wifi-bars{
  width:16px;
  height:14px;
  display:block;
}

.wifi-bars rect{

  transition:fill .2s ease;
}

.task-item.online .wifi-bars rect{ fill:var(--cyan); }
.task-item.online #wifiLabel{ color:var(--cyan); }

.tz-item{

  padding:2px 7px;

  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}

.tz-item:hover{

}

  padding:1px 4px;
  outline:none;

.lang-item:hover{

.lang-option:last-child{ border-bottom:none; }
.lang-option:hover:not(:disabled){ background:#181d2c; color:var(--cyan); }
.lang-option:disabled{ color:var(--text-dim); opacity:.45; cursor:default; }

  // ---------- calculator ----------

  function evaluateExpression(expr){
    var pos = 0;

    function skipSpace(){ while (expr[pos] === ' ' || expr[pos] === '\t') pos++; }

    function parseNumber(){
      skipSpace();
      var start = pos;
      while (pos < expr.length && (expr[pos] >= '0' && expr[pos] <= '9' || expr[pos] === '.')) pos++;
      if (pos === start) throw new Error('expected a number');
      var val = parseFloat(expr.slice(start, pos));
      if (isNaN(val)) throw new Error('invalid number');
      return val;
    }

    function parseUnary(){
      skipSpace();
      if (expr[pos] === '+'){ pos++; return parseUnary(); }
      if (expr[pos] === '-'){ pos++; return -parseUnary(); }
      return parsePrimary();
    }

    function parsePrimary(){
      skipSpace();
      if (expr[pos] === '('){
        pos++;
        var val = parseExpr();
        skipSpace();
        if (expr[pos] !== ')') throw new Error('missing closing parenthesis');
        pos++;
        return val;
      }
      return parseNumber();
    }

    function parseTerm(){
      var val = parseUnary();
      skipSpace();
      while (expr[pos] === '*' || expr[pos] === '/'){
        var op = expr[pos]; pos++;
        var rhs = parseUnary();
        if (op === '*'){ val *= rhs; }
        else {
          if (rhs === 0) throw new Error('division by zero');
          val /= rhs;
        }
        skipSpace();
      }
      return val;
    }

    function parseExpr(){
      var val = parseTerm();
      skipSpace();
      while (expr[pos] === '+' || expr[pos] === '-'){
        var op = expr[pos]; pos++;
        var rhs = parseTerm();
        val = op === '+' ? val + rhs : val - rhs;
        skipSpace();
      }
      return val;
    }

    var result = parseExpr();
    skipSpace();
    if (pos !== expr.length) throw new Error('unexpected character at position ' + (pos + 1));
    return result;
  }

  function formatNumber(n){
    if (!isFinite(n)) return 'Error';

      ? connection.downlink
      : 30 + Math.random() * 90;
    var download = Math.max(1.2, baseDown * (0.78 + Math.random() * 0.36));
    var upload = Math.max(0.6, download * (0.28 + Math.random() * 0.32));
    return {
      download: download,
      upload: upload
    };
  }

  function runWifiSpeedTest(onComplete){
    var item = document.getElementById('wifiItem');
    if (!item) return;
    if (!navigator.onLine){
      item.classList.remove('testing');
      setWifiLabel(t('wifiOffline'));
      if (onComplete) onComplete(null);
      return;
    }

    if (wifiTestTimer){
      clearTimeout(wifiTestTimer);
      wifiTestTimer = null;
    }

    item.classList.add('testing');
    setWifiLabel(t('wifiTesting'));

    wifiTestTimer = setTimeout(function(){
      var speeds = estimateWifiSpeeds();
      lastWifiSpeeds = speeds;
      item.classList.remove('testing');
      setWifiLabel(t('wifiDownShort') + ' ' + formatMbps(speeds.download) + ' / ' + t('wifiUpShort') + ' ' + formatMbps(speeds.upload));
      wifiTestTimer = null;
      if (onComplete) onComplete(speeds);
    }, 900);
  }

  function showWifiSpeedTest(){
    runWifiSpeedTest();
  }

  function updateOnlineStatus(){
    var item = document.getElementById('wifiItem');
    if (navigator.onLine){
      item.classList.add('online');
      if (!item.classList.contains('testing')){
        setWifiLabel(lastWifiSpeeds
          ? t('wifiDownShort') + ' ' + formatMbps(lastWifiSpeeds.download) + ' / ' + t('wifiUpShort') + ' ' + formatMbps(lastWifiSpeeds.upload)
          : t('wifiConnected'));
      }
    } else {
      item.classList.remove('online');
      item.classList.remove('testing');
      if (wifiTestTimer){
        clearTimeout(wifiTestTimer);
        wifiTestTimer = null;
      }
      setWifiLabel(t('wifiOffline'));
    }
  }

  window.addEventListener('online', updateOnlineStatus);
  window.addEventListener('offline', updateOnlineStatus);
  document.getElementById('wifiItem').addEventListener('click', showWifiSpeedTest);
  updateOnlineStatus();

  // ---------- boot ----------

  bootSequence();
  hiddenInput.focus();
})();
</script>

</body>
</html>
